    --accent: #ff8c42;

    padding: 0;
    background: var(--bg);
    color: var(--text);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    line-height: 1.55;
    font-size: 14px;
    min-height: 100vh;
  }
  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 28px 80px;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .header .sub {
    color: var(--muted);
    font-size: 14px;
  }
  .header .path {
    margin-top: 12px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    display: inline-block;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search {
    flex: 1;
    min-width: 240px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .search:focus {
    outline: none;
    border-color: var(--accent);
  }
  .stats {
    color: var(--muted);
    font-size: 12px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .stats strong { color: var(--accent); font-weight: 600; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    transition: all 0.15s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }
  .card:hover::before { transform: scaleX(1); }

  .card-date {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .card-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
    flex: 1;
    margin-bottom: 14px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 500;
    font-family: "SF Mono", Menlo, monospace;

  .tag.blue { background: rgba(88,166,255,0.15); color: var(--blue); }
  .tag.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag.purple { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tag.pink { background: rgba(255,126,182,0.15); color: var(--pink); }
  .tag.gray { background: var(--card-2); color: var(--muted); }

    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;

    border-radius: 3px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    color: var(--blue);

    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;

     SIDEBAR · 分类切换

    gap: 28px;
    margin-top: 8px;

  .sidebar {

    text-transform: uppercase;
    letter-spacing: 0.12em;

    padding: 0 12px;

  .cat-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

    border-left-color: var(--pink);
    color: var(--pink);

    font-size: 11px;
    color: var(--muted);
    background: var(--card-2);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .cat-btn.active .cat-count {
    background: rgba(0,0,0,0.3);
    color: inherit;
  }
  .main-col { min-width: 0; }

  .card-cat {
    position: absolute;
    top: 10px; right: 10px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 9.5px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    font-weight: 600;
    background: var(--accent-dim);

    .layout-grid { grid-template-columns: 1fr; gap: 16px; }
    .sidebar { position: static; }
    .cat-list { flex-direction: row; flex-wrap: wrap; }
    .cat-btn { flex: 1; min-width: 100px; }
  }

  const countEl = document.getElementById('count');
  const searchEl = document.getElementById('search');
  let activeCategory = 'all';

  // 默认 category = "arch"（向后兼容旧条目）
  function catOf(e) { return e.category || 'arch'; }

  function render(list) {
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">没有匹配的可视化</div>';
      return;
    }
    grid.innerHTML = list.map(e => {
      const cat = catOf(e);
      const catLabel = cat === 'interview' ? 'interview' : 'arch';
      return `
      <a class="card" href="${e.file}">
        <span class="card-cat cat-${cat}">${catLabel}</span>
        <div class="card-date">${e.date}</div>
        <h2 class="card-title">${e.title}</h2>
        <div class="card-desc">${e.desc}</div>
        <div class="card-tags">
          ${e.tags.map(t => `<span class="tag ${t.color}">${t.text}</span>`).join('')}
        </div>
      </a>`;
    }).join('');
  }

  function applyFilter() {
    const q = searchEl.value.trim().toLowerCase();
    let filtered = entries;
    if (activeCategory !== 'all') {
      filtered = filtered.filter(e => catOf(e) === activeCategory);
    }
    if (q) {
      filtered = filtered.filter(e => {
        const hay = (e.title + ' ' + e.desc + ' ' + e.tags.map(t => t.text).join(' ')).toLowerCase();
        return hay.includes(q);
      });
    }
    render(filtered);
    countEl.textContent = filtered.length;
  }

  function updateCounts() {
    const counts = { all: entries.length, arch: 0, interview: 0 };
    entries.forEach(e => { counts[catOf(e)] = (counts[catOf(e)] || 0) + 1; });
    document.querySelectorAll('[data-count]').forEach(el => {
      el.textContent = counts[el.dataset.count] || 0;
    });
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      applyFilter();
    });
  });

  searchEl.addEventListener('input', applyFilter);
  updateCounts();
  applyFilter();
</script>
</body>
</html>
